name: Package Create Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - package.json
      - package-lock.json
      - scripts/**
      - .github/workflows/package-create-smoke.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Activate pinned npm
        run: |
          corepack enable
          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            npm@*) ;;
            *)
              echo "Expected package.json packageManager to start with 'npm@', got: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac
          corepack prepare "$PACKAGE_MANAGER" --activate

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime
        run: npm run env:check

      - name: Run package-create smoke test
        run: npm run package:create:smoke -- --package smoke-package
