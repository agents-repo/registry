name: Package Create Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - package.json
      - package-lock.json
      - scripts/**
      - .github/workflows/package-create-smoke.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run package-create smoke test
        run: npm run package:create:smoke -- --package agents-repo/smoke-package
