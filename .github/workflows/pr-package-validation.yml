name: PR Package Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - packages/**
      - scripts/**
      - specs/**
      - package.json
      - package-lock.json
      - .github/workflows/pr-package-validation.yml

jobs:
  package-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run all lints
        run: npm run lint:all

      - name: Determine changed packages
        id: packages
        run: |
          set -euo pipefail

          base_ref="${{ github.base_ref }}"
          git fetch --no-tags origin "$base_ref" --depth=1

          changed_files=$(git diff --name-only "origin/$base_ref"...HEAD)
          candidate_packages=$(printf '%s\n' "$changed_files" | awk -F/ '$1=="packages" && NF>2 {print $2}' | sort -u)
          changed_packages=$(printf '%s\n' "$candidate_packages" | while IFS= read -r pkg; do
            if [ -n "$pkg" ] && [ -f "packages/$pkg/metadata.json" ]; then
              printf '%s\n' "$pkg"
            fi
          done | sort -u)

          if [ -z "$changed_packages" ]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_packages=true"
            echo "package_list<<EOF"
            printf '%s\n' "$changed_packages"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run package source validation
        if: steps.packages.outputs.has_packages == 'true'
        env:
          PACKAGE_LIST: ${{ steps.packages.outputs.package_list }}
        run: |
          set -euo pipefail

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "Running checks for package: $pkg"

            npm run package:validate -- --package "$pkg"
          done <<< "$PACKAGE_LIST"

          echo "PR package checks intentionally skip package:build and package:validate-artifacts."
          echo "Version snapshots are generated locally and committed with package changes."

      - name: Skip when no package directory changed
        if: steps.packages.outputs.has_packages != 'true'
        run: echo "No package directories changed; package validation skipped."
