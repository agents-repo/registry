name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@11.12.1 --activate

      # TODO(issue-45): wire full validation commands:
      # npm run env:check
      # npm run lint:md
      # npm run lint:sonar
      # npm run typecheck
      # npm run test:run
      # npm run package:scan-zips
      - name: Validation Placeholder
        run: |
          echo "Release workflow skeleton is in place."
          echo "Full validation chain will be wired in follow-up commits."

  release:
    name: Publish GitHub Release (Placeholder)
    runs-on: ubuntu-latest
    needs:
      - validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      # TODO(issue-45): add dry-run gate and release publication steps.
      - name: Release Placeholder
        run: |
          echo "Tag detected: ${GITHUB_REF_NAME}"
          echo "Release publication will be implemented in follow-up commits."