name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup npm via Corepack
        run: |
          corepack enable
          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            npm@*) ;;
            *)
              echo "Expected package.json packageManager to start with 'npm@', got: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac
          corepack prepare "$PACKAGE_MANAGER" --activate

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime
        run: npm run env:check

      - name: Run markdown lint
        run: npm run lint:md

      - name: Run Sonar lint
        run: npm run lint:sonar

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Scan package ZIPs
        run: npm run package:scan-zips

  release-dry-run:
    name: Release Dry Run
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup npm via Corepack
        run: |
          corepack enable
          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            npm@*) ;;
            *)
              echo "Expected package.json packageManager to start with 'npm@', got: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac
          corepack prepare "$PACKAGE_MANAGER" --activate

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release (dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

  release-publish:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup npm via Corepack
        run: |
          corepack enable
          PACKAGE_MANAGER="$(node -p "require('./package.json').packageManager")"
          case "$PACKAGE_MANAGER" in
            npm@*) ;;
            *)
              echo "Expected package.json packageManager to start with 'npm@', got: $PACKAGE_MANAGER" >&2
              exit 1
              ;;
          esac
          corepack prepare "$PACKAGE_MANAGER" --activate

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
