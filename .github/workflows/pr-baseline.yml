name: PR Baseline Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pinned npm
        uses: ./.github/actions/setup-node-pinned-npm

      - name: Validate runtime
        run: npm run env:check

      - name: Run all lints
        run: npm run lint:all

      - name: Run unit tests
        run: npm run test:run

      - name: Typecheck
        run: npm run typecheck

      - name: Scan package ZIPs
        run: npm run package:scan-zips
