name: Copilot Environment Preflight

on:
  workflow_dispatch:
  workflow_call:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Activate pinned npm
        run: |
          corepack enable
          corepack prepare npm@11.12.1 --activate

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime
        run: npm run env:check

      - name: Typecheck
        run: npm run typecheck
