name: Bug or inconsistency report
description: Report a broken rule, mismatch, or validation problem.
title: "fix: "
labels:
  - bug
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        **Branch name:** `fix/<issue-number>-<short-slug>`
        **Example:** `fix/42-correct-manifest-artifact-rule`
        Create this issue first to get the issue number, then open the branch.

        Security vulnerabilities MUST NOT be reported in public issues.
        Use https://github.com/agents-repo/registry/security/advisories/new
        for private disclosure instead.

        You MUST open a draft pull request targeting `main` before implementation
        commits. Include
        `Closes #<issue-number>` in `## Related Issues`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or inconsistent?
    validations:
      required: true

  - type: input
    id: affected-file
    attributes:
      label: Affected file
      description: Provide a path if known.
      placeholder: specs/manifest-schema.md

  - type: textarea
    id: environment
    attributes:
      label: Environment and command context
      description: Include OS, Node/npm versions, and command(s) used.
      placeholder: |
        - OS:
        - Node:
        - npm:
        - Command(s):

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Validation output, screenshots, or links.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I confirmed this issue is still reproducible.
          required: true
        - label: >-
            I checked that this is still reproducible on the latest main
            branch state.
          required: true
        - label: I searched for existing similar issues.
          required: true
        - label: >-
            If I open a PR for this issue, I will include
            `Closes #<issue-number>` in `## Related Issues`.
          required: true
