name: Bug or inconsistency report
description: Report a broken rule, mismatch, or validation problem.
title: "fix: "
labels:
  - bug
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        Security vulnerabilities MUST NOT be reported in public issues.
        Use https://github.com/agents-repo/registry/security/advisories/new
        for private disclosure instead.

        **Branch pattern:** `fix/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `fix/42-correct-manifest-artifact-rule`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or inconsistent?
    validations:
      required: true

  - type: input
    id: affected-file
    attributes:
      label: Affected file
      description: Provide a path if known.
      placeholder: specs/manifest-schema.md

  - type: textarea
    id: environment
    attributes:
      label: Environment and command context
      description: Include OS, Node/npm versions, and command(s) used.
      placeholder: |
        - OS:
        - Node:
        - npm:
        - Command(s):

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Validation output, screenshots, or links.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I confirmed this issue is still reproducible.
          required: true
        - label: >-
            I checked that this is still reproducible on the latest main
            branch state.
          required: true
        - label: I searched for existing similar issues.
          required: true
        - label: >-
            I will open a draft PR with `gh pr create --draft` before
            implementation commits and mark it ready for review after validation.
          required: true
