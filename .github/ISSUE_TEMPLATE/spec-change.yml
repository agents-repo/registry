name: Spec change request
description: Request a change to one or more files in specs/.
title: "spec: "
labels:
  - specs
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose deterministic changes to registry specs.

        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `spec/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `spec/7-add-contract-schema`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).

  - type: dropdown
    id: spec-file
    attributes:
      label: Primary spec file
      options:
        - specs/package-format.md
        - specs/metadata-schema.md
        - specs/manifest-schema.md
        - specs/agent-format.md
        - specs/flow-format.md
        - specs/versioning-rules.md
        - specs/index-schema.md
        - specs/install-targets.md
        - specs/schema-versions.json
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior or rule
      description: What does the spec currently say?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: What exact rule text should be added or updated?
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Does this introduce a breaking change?
      placeholder: |
        - Breaking: yes/no
        - Impacted packages:
        - Migration notes:
    validations:
      required: true

  - type: textarea
    id: impacted-dependencies
    attributes:
      label: Impacted dependent files or surfaces
      description: >-
        List specs, templates, docs, and JSON examples that may require
        updates because of this rule change.
      placeholder: |
        - specs/manifest-schema.md
        - specs/versioning-rules.md
        - .github/pull_request_template.md
        - README.md example tree
        - metadata.json or versions/manifest.json examples
    validations:
      required: true

  - type: checkboxes
    id: quality-checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing similar issues.
          required: true
        - label: I used deterministic language (MUST, SHOULD, MAY).
          required: true
        - label: I included at least one concrete example.
          required: true
        - label: I considered versioning implications.
          required: true
        - label: >-
            I will open a draft PR with `gh pr create --draft` before
            implementation commits and mark it ready for review after validation.
          required: true
