name: Task or chore
description: Track maintenance and operational work.
title: "chore: "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        **Branch name:** `chore/<issue-number>-<short-slug>`
        **Example:** `chore/31-update-dependencies`
        Create this issue first to get the issue number, then open the branch.

        If you open a PR for this issue, include
        `Closes #<issue-number>` in `## Related Issues`.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be completed?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Task list
      description: Break work into actionable items.
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
        - [ ] Task 3
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: Done criteria
      description: How will completion be verified?
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: >-
            If I open a PR for this issue, I will include
            `Closes #<issue-number>` in `## Related Issues`.
          required: true
