name: Task or chore
description: Track maintenance and operational work.
title: "chore: "
labels:
  - chore
type: Task
body:
  - type: markdown
    attributes:
      value: |
        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `chore/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `chore/31-update-dependencies`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be completed?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Task list
      description: Break work into actionable items.
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
        - [ ] Task 3
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: Done criteria
      description: How will completion be verified?
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing similar issues.
          required: true
        - label: >-
            I will open a draft PR with `gh pr create --draft` before
            implementation commits and mark it ready for review after validation.
          required: true
