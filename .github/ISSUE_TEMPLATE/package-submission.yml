name: Package submission
description: Submit a new agent or flow package to the registry.
title: "feat(package): "
labels:
  - package
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Use this form to submit a new package under packages/.
        A package may contain agents, flows, or both.
        Submitted package content must be licensed under MIT.

        For corrections to an **existing** published package, use the
        **Package correction** form instead (`fix(package):` title).

        **Branch name:** `package/<issue-number>-<package-name>`
        **Example:** `package/56-my-package-name`
        Create this issue first to get the issue number, then open the branch.

        **PR title:** use `feat(package):` for new packages or new package
        versions. GitHub uses the PR title as the default squash-merge commit
        message, which MUST match this format so semantic-release publishes a
        registry release tag.

        You MUST open a draft pull request targeting `main` before implementation
        commits (`gh pr create --draft`). The developer manually marks the PR
        ready for review after validation. Include
        `Closes #<issue-number>` in `## Related Issues`.

  - type: dropdown
    id: package-type
    attributes:
      label: Package contents
      description: >-
        Select the package contents. A package must contain at least one per
        specs/package-format.md.
      options:
        - Contains agents (`agents/` directory)
        - Contains flows (`flows/` directory)
        - Contains both agents and flows
    validations:
      required: true

  - type: input
    id: package-name
    attributes:
      label: Package name
      description: Must be lowercase kebab-case.
      placeholder: my-package-name
    validations:
      required: true

  - type: textarea
    id: package-description
    attributes:
      label: Package description
      description: >-
        Required field in metadata.json. 1 to 300 characters.
      placeholder: Short description of what this package does.
    validations:
      required: true

  - type: input
    id: package-owner
    attributes:
      label: Owner
      description: >-
        GitHub username or organization slug. Required field in
        metadata.json.
      placeholder: my-org
    validations:
      required: true

  - type: input
    id: package-homepage
    attributes:
      label: Homepage URL
      description: HTTPS URL. Required field in metadata.json.
      placeholder: https://github.com/my-org/my-repo
    validations:
      required: true

  - type: input
    id: package-repository
    attributes:
      label: Repository URL
      description: HTTPS URL to source repository. Required field in metadata.json.
      placeholder: https://github.com/my-org/my-repo
    validations:
      required: true

  - type: input
    id: package-tags
    attributes:
      label: Tags
      description: >-
        1 to 20 lowercase tags, comma-separated. Required field in
        metadata.json.
      placeholder: productivity, review, automation
    validations:
      required: true

  - type: textarea
    id: package-path
    attributes:
      label: Proposed path
      description: Path under packages/.
      placeholder: packages/my-package-name/
    validations:
      required: true

  - type: textarea
    id: contents
    attributes:
      label: Package files
      description: List expected files in the package.
      placeholder: |
        agents/
          <agent-id>.agent.md
          <agent-id>.metadata.json
        flows/  (if applicable)
          <flow-id>.agent.md
          <flow-id>.metadata.json
        metadata.json
        versions/
          <version>/
            metadata.json
            agents/
              <agent-id>.agent.md
              <agent-id>.metadata.json
            flows/  (if applicable)
              <flow-id>.agent.md
              <flow-id>.metadata.json
            <version>.zip
            <version>-src.zip
          manifest.json
    validations:
      required: true

  - type: textarea
    id: release
    attributes:
      label: Release metadata
      description: >-
        Provide required package metadata fields from metadata.json, plus the
        required top-level manifest fields and the initial version entry
        artifact details. See CONTRIBUTING.md "Submitted package checklist"
        and specs/metadata-schema.md for complete requirements.
      placeholder: |
        - metadata.schemaVersion: <supported version from specs/schema-versions.json>
        - metadata.status: <active|deprecated|archived|yanked>
        - metadata.category: <non-empty string>
        - metadata.estimateOverallCost.band: <minimal|low|moderate|high|critical|mixed>
        - metadata.estimateOverallCost.estimatedCost: <optional integer 1-10>
        - metadata.createdAt: <RFC 3339 timestamp, e.g. 2026-05-02T00:00:00Z>
        - metadata.updatedAt: <RFC 3339 timestamp, e.g. 2026-05-02T00:00:00Z>
        - manifest.schemaVersion: <supported version from specs/schema-versions.json>
        - manifest.name: "my-package-name"
        - manifest.latest: "1.0.0"
        - version: "1.0.0"
        - createdAt: <RFC 3339 timestamp, e.g. 2026-05-02T00:00:00Z>
        - artifact: "1.0.0.zip"
        - sha256: <64-char-lowercase-hex>
        - srcArtifact: "1.0.0-src.zip"
        - srcSha256: <64-char-lowercase-hex>
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: Package license
      description: Submitted package content is accepted only under MIT.
      options:
        - MIT
    validations:
      required: true

  - type: checkboxes
    id: submission-checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing similar issues and package submissions.
          required: true
        - label: I followed specs/package-format.md.
          required: true
        - label: >-
            I followed specs/agent-format.md for any files under agents/
            and/or specs/flow-format.md for any files under flows/, as
            applicable to this package.
          required: true
        - label: I followed specs/metadata-schema.md.
          required: true
        - label: I followed specs/manifest-schema.md.
          required: true
        - label: I followed specs/versioning-rules.md for the initial release.
          required: true
        - label: >-
            All agent IDs and flow IDs are unique across both agents/ and
            flows/ in this package, to avoid collisions in the deployment
            artifact, per specs/package-format.md.
          required: true
        - label: The submitted package content is licensed under MIT.
          required: true
        - label: I authored this content or have the right to submit it under MIT.
          required: true
        - label: I did not include third-party content unless it is licensed under MIT.
          required: true
        - label: >-
            Deployment ZIP (<version>.zip) includes only bundled
            agents/*.agent.md files for all agents and flows in this
            version, per specs/package-format.md.
          required: true
        - label: >-
            Source ZIP (<version>-src.zip) includes full package source,
            including .metadata.json sidecars and other top-level package
            files present at release time, and excludes versions/ per
            specs/package-format.md.
          required: true
        - label: >-
            metadata.json includes a supported "schemaVersion" from
            specs/schema-versions.json, and valid createdAt and updatedAt
            RFC 3339 timestamps.
          required: true
        - label: >-
            All agent and flow .metadata.json sidecars include supported
            "schemaVersion" values from specs/schema-versions.json.
          required: true
        - label: >-
            No metadata or manifest file uses an end-of-life schema version;
            deprecated schema versions are acknowledged for migration.
          required: true
        - label: manifest.json version entries include a valid createdAt timestamp.
          required: true
        - label: >-
            versions/ snapshot contents (version folder, ZIPs, checksums,
            manifest.json) were generated by `npm run package:build` and were
            not manually authored or modified.
          required: true
        - label: >-
            `npm run package:validate-artifacts` passed for this version.
          required: true
        - label: >-
            If I open a PR for this issue, I will include
            `Closes #<issue-number>` in `## Related Issues`.
          required: true
