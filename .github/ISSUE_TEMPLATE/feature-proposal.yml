name: Feature proposal
description: Propose a new capability for the registry platform.
title: "feat: "
labels:
  - enhancement
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new capabilities in the registry workflow,
        governance, or contributor experience.

        If your request changes normative rules or format definitions in
        `specs/`, use the "Spec change request" issue template instead.

        **Workflow:** Submit this issue first. After GitHub assigns a number,
        create your branch and draft PR—do not edit this issue body to add the
        number.

        **Branch pattern:** `feat/<issue-number>-<slug>` (use the assigned number
        and a short lowercase kebab-case slug from the title)

        **Example:** `feat/15-search-index`

        **Draft PR:** Open with `gh pr create --draft` before implementation
        commits. Put the tracking reference in the PR `## Related Issues` section
        (not in this issue).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature do you want to add?
      placeholder: Add a short and clear feature summary.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed for the registry?
      placeholder: Describe the problem or opportunity.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        -
        Out of scope:
        -
    validations:
      required: true

  - type: textarea
    id: impacted-areas
    attributes:
      label: Impacted areas
      description: Which folders or docs are affected?
      placeholder: |
        - specs/
        - packages/
        - scripts/

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I reviewed existing issues and this is not duplicated.
          required: true
        - label: I described measurable acceptance criteria.
          required: true
        - label: >-
            I will open a draft PR with `gh pr create --draft` before
            implementation commits and mark it ready for review after validation.
          required: true
        - label: I can help test or review this feature.
          required: false
